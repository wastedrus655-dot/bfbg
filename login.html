<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RobyCord - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-box {
            background: #0f0f18;
            padding: 40px;
            border-radius: 28px;
            width: 320px;
            text-align: center;
            border: 1px solid rgba(194,49,82,0.3);
        }
        .login-box h1 {
            color: #ffffff;
            margin-bottom: 30px;
            font-size: 28px;
            background: linear-gradient(135deg, #fff, #c23152);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-box input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(194,49,82,0.3);
            background: #08080c;
            color: #ffffff;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
        }
        .login-box input:focus { border-color: #c23152; }
        .login-box button {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #c23152, #8a153a);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .error { color: #e94560; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>RobyCord</h1>
        <input type="password" id="password" placeholder="Enter password" autocomplete="off">
        <button onclick="login()">Login</button>
        <div id="error" class="error"></div>
    </div>
    <script>
        const PASSWORD = "55Fxvg7t";
        
        function login() {
            const pass = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            
            if (pass === PASSWORD) {
                window.location.href = 'index.html';
            } else {
                errorDiv.innerText = 'Wrong password';
            }
        }
        
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
